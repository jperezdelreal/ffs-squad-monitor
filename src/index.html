<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFS Squad Monitor</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <h1>🖥️ <span class="title-text">FFS Squad Monitor</span><span class="title-short">FFS</span></h1>
    <div class="topbar-right">
      <div class="connection-status">
        <span class="dot gray" id="conn-dot"></span>
        <span id="conn-text">Connecting…</span>
      </div>
      <button class="settings-btn" id="settings-toggle" aria-label="Settings" aria-expanded="false" title="Refresh settings">⚙</button>
    </div>
    <div class="settings-panel" id="settings-panel">
      <label for="refresh-interval">Refresh Interval</label>
      <select id="refresh-interval"></select>
      <button class="pause-btn" id="pause-btn">⏸ Pause</button>
    </div>
  </header>

  <main class="main">

    <!-- Ralph Status -->
    <div class="section-title">Ralph Watch</div>
    <div class="ralph-grid">
      <div class="card">
        <h3>Heartbeat</h3>
        <p id="heartbeat-status" style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.75rem;">
          <span class="dot gray" id="ralph-dot"></span>
          <span id="status-text">Waiting for data…</span>
        </p>
        <dl id="heartbeat-data"></dl>
      </div>
      <div class="card">
        <h3>Round Stats</h3>
        <p id="round-info">No round data yet</p>
      </div>
    </div>

    <!-- Timeline -->
    <div class="section-title">Round Timeline</div>
    <div class="card" id="timeline">
      <p class="empty-state">No round data yet.</p>
    </div>

    <!-- Repos -->
    <div class="section-title">Studio Repos</div>
    <div class="repos-grid" id="repos-grid">
      <div class="repo-card empty-state">Loading repos…</div>
    </div>

    <!-- Log Viewer -->
    <div class="section-title">Log Viewer <span class="log-count" id="log-count"></span></div>
    <div class="card">
      <div class="log-toolbar">
        <div class="log-filter-group">
          <label for="log-agent">Agent</label>
          <select id="log-agent"><option value="">All</option></select>
        </div>
        <div class="log-filter-group">
          <label for="log-level">Level</label>
          <select id="log-level">
            <option value="">All</option>
            <option value="info">Info</option>
            <option value="warn">Warn</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div class="log-filter-group">
          <label for="log-date">Date</label>
          <input type="date" id="log-date" />
        </div>
        <div class="log-stream-badge" id="stream-badge">
          <span class="log-stream-dot"></span>
          <span id="stream-text">Streaming</span>
        </div>
      </div>
      <div id="log-entries">
        <p class="log-empty">Connecting to log stream…</p>
      </div>
    </div>

  </main>

  <footer class="footer">
    <a href="https://github.com/jperezdelreal/ffs-squad-monitor" target="_blank" rel="noopener">ffs-squad-monitor</a> · First Frame Studios
  </footer>

  <script type="module" src="./monitor.js"></script>
</body>
</html>
