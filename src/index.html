<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFS Squad Monitor</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
    }
    h1 { margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 { font-size: 1rem; color: var(--text-muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 0.5rem;
    }
    .status-dot.idle { background: var(--green); }
    .status-dot.running { background: var(--yellow); animation: pulse 1.5s infinite; }
    .status-dot.error { background: var(--red); }
    .status-dot.unknown { background: var(--text-muted); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #heartbeat-data { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.9rem; }
    #heartbeat-data dt { color: var(--text-muted); float: left; width: 120px; }
    #heartbeat-data dd { margin-bottom: 0.25rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    #log-entries { font-family: monospace; font-size: 0.85rem; max-height: 300px; overflow-y: auto; }
    .log-entry { padding: 0.25rem 0; border-bottom: 1px solid var(--border); color: var(--text-muted); }
  </style>
</head>
<body>
  <h1>🖥️ FFS Squad Monitor</h1>
  <p class="subtitle">Real-time dashboard for First Frame Studios AI squad</p>

  <div class="grid">
    <div class="card">
      <h2>Heartbeat</h2>
      <p id="heartbeat-status">
        <span class="status-dot unknown"></span>
        <span id="status-text">Waiting for data...</span>
      </p>
      <dl id="heartbeat-data"></dl>
    </div>

    <div class="card">
      <h2>Round Stats</h2>
      <p id="round-info" style="color: var(--text-muted);">No round data yet</p>
    </div>
  </div>

  <div class="card">
    <h2>Activity Log</h2>
    <div id="log-entries">
      <p style="color: var(--text-muted);">No log entries yet. Connect to FFS to start monitoring.</p>
    </div>
  </div>

  <script type="module" src="./monitor.js"></script>
</body>
</html>
